name: Daily AI News + n8n Notify

on:
  schedule:
    # Runs at 6:00 AM UTC daily (11:30 AM IST)
    - cron: '0 6 * * *'
  workflow_dispatch:  # allows manual trigger from GitHub UI

jobs:
  generate-and-notify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync

      - name: Run Horizon
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: uv run horizon --hours 24

      - name: Find latest summary file
        id: find_summary
        run: |
          LATEST=$(ls -t data/summaries/*.md 2>/dev/null | head -1)
          echo "summary_file=$LATEST" >> $GITHUB_OUTPUT
          echo "Found: $LATEST"

      - name: Notify n8n webhook
        if: steps.find_summary.outputs.summary_file != ''
        run: |
          SUMMARY=$(cat "${{ steps.find_summary.outputs.summary_file }}")
          DATE=$(date +%Y-%m-%d)
          
          # Send the summary content + metadata to n8n
          curl -X POST "${{ secrets.N8N_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg date "$DATE" \
              --arg summary "$SUMMARY" \
              --arg run_id "${{ github.run_id }}" \
              '{date: $date, summary: $summary, run_id: $run_id}')"

      - name: Commit summaries back to repo (optional)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/summaries/
          git diff --staged --quiet || git commit -m "Daily AI news summary $(date +%Y-%m-%d)"
          git push
